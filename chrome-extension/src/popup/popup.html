<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Analyzer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard {
            padding: 20px;
        }

        .user-info {
            background: #FF9900;
            color: #232F3E;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .welcome {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .email {
            font-size: 13px;
            opacity: 0.8;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #FF9900;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-secondary {
            padding: 12px;
            background: white;
            color: #232F3E;
            border: 2px solid #FF9900;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #FF9900;
            color: #232F3E;
        }

        .btn-logout {
            background: #dc3545;
            border-color: #dc3545;
            color: white;
        }

        .btn-logout:hover {
            background: #c82333;
            border-color: #c82333;
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <div class="user-info">
            <div class="welcome">Welcome, <span id="userName">User</span>! 👋</div>
            <div class="email" id="userEmail">email@example.com</div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Products Analyzed</div>
                <div class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Subscription</div>
                <div class="stat-value" id="userTier">Free</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-secondary" id="analyzeBtn">🔍 Analyze Current Page</button>
            <button class="btn-secondary" id="settingsBtn">⚙️ Settings</button>
            <button class="btn-secondary btn-logout" id="logoutBtn">🚪 Logout</button>
        </div>
    </div>

    <script type="module" src="popup.js"></script>
</body>

</html>
